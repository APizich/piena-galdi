name: Update Milk Stands Data

on:
  schedule:
    - cron: '0 * * * *' # Runs at the top of every hour
  workflow_dispatch: # Adds a button so you can trigger it manually anytime!

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the bot to save files to your repository

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run data fetcher script
        run: python update_data.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          
          # This checks if the file actually changed. If yes, it commits and pushes.
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update map data"
          git push
