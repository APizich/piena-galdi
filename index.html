<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milk Churn Stands in Latvia</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        body { margin: 0; padding: 0; font-family: Arial, sans-serif; display: flex; height: 100vh; color: #333; }
        #map { flex: 7; height: 100%; }
        #sidebar { flex: 3; height: 100%; background-color: #f8f9fa; border-left: 1px solid #ccc; padding: 20px; overflow-y: auto; box-sizing: border-box; }
        
        /* Language Toggle Switch */
        .lang-switch { background: #fff; padding: 10px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 20px; }
        .lang-switch label { margin-right: 15px; cursor: pointer; font-weight: bold; }
        
        .intro-text { margin-bottom: 20px; font-size: 14px; }
        .image-container img { max-width: 100%; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-top: 10px; }
        .tag-box { background: #e9ecef; padding: 10px; border-radius: 5px; margin-top: 10px; font-size: 13px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="sidebar">
        <div class="lang-switch">
            <label><input type="radio" name="lang" value="en" onchange="changeLanguage('en')"> English</label>
            <label><input type="radio" name="lang" value="lv" onchange="changeLanguage('lv')" checked> Latviešu</label>
        </div>

        <h2 id="ui-title">🥛 Piena galdi Latvijā</h2>
        <div class="intro-text">
            <p id="ui-intro">Šajā kartē ir redzami <strong>man_made=milk_churn_stand</strong> objekti Latvijā.</p>
            <p><span id="ui-green">🟢 <strong>Zaļie punkti</strong> = ar Wikimedia attēlu</span><br>
               <span id="ui-blue">🔵 <strong>Zilie punkti</strong> = bez attēla</span></p>
            <hr>
            <p><em id="ui-click">Noklikšķini uz jebkura marķiera kartē, lai šeit redzētu tā informāciju.</em></p>
        </div>
        
        <div id="details"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // --- Translations Dictionary ---
        const TEXT = {
            "en": {
                title: "🥛 Milk Churn Stands in Latvia",
                intro: "This map shows <strong>man_made=milk_churn_stand</strong> objects within Latvia.",
                green: "🟢 <strong>Green dots</strong> = with Wikimedia image",
                blue: "🔵 <strong>Blue dots</strong> = no image",
                click: "Click any marker on the map to view its details here.",
                material: "Material",
                unknown: "Unknown",
                no_img: "No Wikimedia Commons image found.",
                click_img: "Click image to open Wikimedia Commons",
                osm_desc: "OSM Description",
                wiki_desc: "Wikimedia Description",
                default_name: "Milk churn stand"
            },
            "lv": {
                title: "🥛 Piena galdi Latvijā",
                intro: "Šajā kartē ir redzami <strong>man_made=milk_churn_stand</strong> objekti Latvijā.",
                green: "🟢 <strong>Zaļie punkti</strong> = ar Wikimedia attēlu",
                blue: "🔵 <strong>Zilie punkti</strong> = bez attēla",
                click: "Noklikšķini uz jebkura marķiera kartē, lai šeit redzētu tā informāciju.",
                material: "Materiāls",
                unknown: "Nav zināms",
                no_img: "Wikimedia attēls nav pieejams.",
                click_img: "Noklikšķini uz attēla, lai atvērtu Wikimedia Commons",
                osm_desc: "OSM apraksts",
                wiki_desc: "Wikimedia apraksts",
                default_name: "Piena galds"
            }
        };

        // --- State Variables ---
        let currentLang = 'lv';
        let mapData = [];
        let lastClickedStand = null;

        // --- Map Initialization ---
        
        // 1. Define your Base Layers
        const cartoLight = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        });

        // NEW: Standard OpenStreetMap Layer
        const osmStandard = L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        });

        const lvmOrto = L.tileLayer.wms("https://lvmgeoserver.lvm.lv/geoserver/ows", {
            layers: 'public:Orto_LKS',
            format: 'image/jpeg',
            transparent: false,
            attribution: "&copy; LVM GEO / LĢIA"
        });

        // 2. Initialize the map and specify which layer shows up first
        const map = L.map('map', {
            center: [56.8796, 24.6032],
            zoom: 7,
            layers: [cartoLight] // The map will still start with the clean Carto Light map
        });

        // 3. Create the Layer Control menu (Now with 3 options!)
        const baseMaps = {
            "Gaišā karte (Carto)": cartoLight,
            "Standarta OSM (Krāsaina)": osmStandard,
            "Ortofoto (LVM GEO)": lvmOrto
        };

        // 4. Add the menu to the top right corner of the map
        L.control.layers(baseMaps, null, { position: 'topright' }).addTo(map);

        // We use a LayerGroup so we can clear and redraw markers instantly when language changes
        const markerLayer = L.layerGroup().addTo(map);

        // --- Core Functions ---
        function changeLanguage(lang) {
            currentLang = lang;
            
            // 1. Update static UI text
            document.getElementById('ui-title').innerText = TEXT[lang].title;
            document.getElementById('ui-intro').innerHTML = TEXT[lang].intro;
            document.getElementById('ui-green').innerHTML = TEXT[lang].green;
            document.getElementById('ui-blue').innerHTML = TEXT[lang].blue;
            document.getElementById('ui-click').innerText = TEXT[lang].click;

            // 2. Redraw map markers (so tooltips translate)
            drawMarkers();

            // 3. Update the sidebar if a stand is currently selected
            if (lastClickedStand) {
                showDetails(lastClickedStand);
            }
        }

        function drawMarkers() {
            markerLayer.clearLayers();
            
            mapData.forEach(stand => {
                const hasImage = stand.image !== "";
                const marker = L.circleMarker([stand.lat, stand.lon], {
                    radius: hasImage ? 8 : 5,
                    fillColor: hasImage ? "#28B463" : "#1E90FF",
                    color: hasImage ? "#145A32" : "#154360",
                    weight: 1, fillOpacity: hasImage ? 0.9 : 0.7
                });

                // Determine correct name based on language
                const standName = stand[`name_${currentLang}`] || stand.name_default || TEXT[currentLang].default_name;
                marker.bindTooltip(standName);

                marker.on('click', () => showDetails(stand));
                markerLayer.addLayer(marker);
            });
        }

        function showDetails(stand) {
            lastClickedStand = stand; // Save state
            const t = TEXT[currentLang];
            const detailsDiv = document.getElementById('details');
            
            const standName = stand[`name_${currentLang}`] || stand.name_default || t.default_name;
            const material = stand.material || t.unknown;
            
            let html = `<h3>${standName}</h3>`;
            html += `<p><strong>${t.material}:</strong> ${material}</p>`;
            
            if (stand.image) {
                html += `
                <div class="image-container">
                    <a href="${stand.commons_page || stand.image}" target="_blank">
                        <img src="${stand.image}" alt="Image">
                    </a>
                    <p style="font-size: 11px; text-align: center; color: #666;">${t.click_img}</p>
                </div>`;
            } else {
                html += `<p style="color: #888;"><em>${t.no_img}</em></p>`;
            }

            // Get the correct language description
            const osmDesc = stand[`osm_desc_${currentLang}`] || stand.osm_desc_default;
            const wikiDesc = stand[`wiki_desc_${currentLang}`];

            if (osmDesc) {
                html += `<div class="tag-box"><strong>${t.osm_desc}:</strong><br>${osmDesc}</div>`;
            }
            if (wikiDesc) {
                html += `<div class="tag-box"><strong>${t.wiki_desc}:</strong><br>${wikiDesc}</div>`;
            }

            html += `<p style="font-size: 11px; color: #aaa; margin-top: 20px;">OSM: ${stand.osm_type}/${stand.osm_id}</p>`;
            detailsDiv.innerHTML = html;
        }

        // --- Fetch Data on Load ---
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                mapData = data;
                drawMarkers();
            })
            .catch(error => console.error('Error loading data.json:', error));

    </script>
</body>
</html>
